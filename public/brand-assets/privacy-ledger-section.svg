<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 620" role="img" aria-labelledby="title desc">
  <title id="title">Private user-owned history illustration</title>
  <desc id="desc">A minimal privacy card with a lock, checkmarks, and a user-owned history control.</desc>

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0c0a09" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0c0a09" flood-opacity="0.08"/>
    </filter>

    <filter id="innerSoft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0c0a09" flood-opacity="0.045"/>
    </filter>

    <linearGradient id="cardFill" x1="325" y1="54" x2="325" y2="574" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffefd"/>
      <stop offset="1" stop-color="#f8f6f1"/>
    </linearGradient>

    <linearGradient id="panelFill" x1="325" y1="188" x2="325" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffefa"/>
      <stop offset="1" stop-color="#fbfaf6"/>
    </linearGradient>

    <linearGradient id="ink" x1="294" y1="274" x2="354" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20201f"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>

  <rect width="650" height="620" fill="none"/>

  <!-- Outer privacy card -->
  <rect
    x="54"
    y="54"
    width="542"
    height="520"
    rx="30"
    fill="url(#cardFill)"
    stroke="#242321"
    stroke-width="2"
    filter="url(#softShadow)"
  />

  <!-- Top confirmation mark -->
  <path
    d="M492 132l17 17 41-50"
    fill="none"
    stroke="#242321"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Lock shackle -->
  <g fill="none" stroke="#242321" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M257 190v-35c0-44 31-72 68-72s68 28 68 72v35"/>
    <path d="M274 190v-34c0-33 23-53 51-53s51 20 51 53v34"/>
  </g>

  <!-- Lock body -->
  <rect
    x="184"
    y="188"
    width="282"
    height="252"
    rx="22"
    fill="url(#panelFill)"
    stroke="#242321"
    stroke-width="2"
    filter="url(#innerSoft)"
  />

  <!-- Keyhole -->
  <circle cx="325" cy="307" r="32" fill="url(#ink)"/>
  <path
    d="M325 333v42"
    fill="none"
    stroke="url(#ink)"
    stroke-width="14"
    stroke-linecap="round"
  />

  <!-- Bottom user-owned control group -->
  <g transform="translate(100 454)">
    <rect
      x="0"
      y="0"
      width="58"
      height="58"
      rx="14"
      fill="#fffefa"
      stroke="#d8d4cd"
      stroke-width="1.2"
    />

    <path
      d="M29 15c8 6 15 5 15 5v13c0 12-7 19-15 23-8-4-15-11-15-23V20s7 1 15-5z"
      fill="none"
      stroke="#242321"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <text
      x="78"
      y="24"
      font-family="Inter, Arial, sans-serif"
      font-size="18"
      font-weight="700"
      letter-spacing="-0.2"
      fill="#191817"
    >user-owned history</text>

    <text
      x="78"
      y="49"
      font-family="Inter, Arial, sans-serif"
      font-size="13.5"
      fill="#706b63"
    >delete reports, account data, and saved context</text>
  </g>

  <!-- Bottom confirmation mark -->
  <path
    d="M492 493l17 17 41-50"
    fill="none"
    stroke="#242321"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
