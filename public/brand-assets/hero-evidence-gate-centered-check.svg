<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Evidence gate hero illustration</title>
  <desc id="desc">A skincare product is checked against label evidence and user history before being added to the routine shelf.</desc>

  <defs>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0c0a09" flood-opacity="0.07"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0c0a09" flood-opacity="0.07"/>
    </filter>

    <filter id="smallShadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0c0a09" flood-opacity="0.045"/>
    </filter>

    <linearGradient id="fieldFill" x1="360" y1="218" x2="360" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffefd"/>
      <stop offset="1" stop-color="#f8f6f1"/>
    </linearGradient>

    <linearGradient id="bottleFill" x1="360" y1="70" x2="360" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fffefa"/>
      <stop offset="1" stop-color="#f6f3ec"/>
    </linearGradient>

    <linearGradient id="inkBand" x1="236" y1="360" x2="484" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151412"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </linearGradient>
  </defs>

  <rect width="720" height="720" fill="none"/>

  <g opacity=".58" stroke="#d8d4cd" stroke-width="1.1" fill="none" stroke-linecap="round">
    <path d="M104 126h150M120 166h184M142 206h96"/>
    <path d="M474 126h142M432 166h188M500 206h82"/>
    <path d="M96 538h170M130 578h118"/>
    <path d="M468 538h164M498 578h96"/>
  </g>

  <g filter="url(#smallShadow)">
    <rect x="316" y="74" width="88" height="124" rx="22" fill="url(#bottleFill)" stroke="#0c0a09" stroke-width="1.5"/>
    <rect x="337" y="52" width="46" height="31" rx="9" fill="#fffefa" stroke="#0c0a09" stroke-width="1.5"/>
    <rect x="331" y="113" width="58" height="44" rx="9" fill="#fffefd" stroke="#d8d4cd" stroke-width="1"/>
    <path d="M345 130h30M345 143h20" stroke="#746f67" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <path d="M360 206v34" stroke="#0c0a09" stroke-width="1.05" opacity=".24" fill="none" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <rect x="218" y="240" width="284" height="252" rx="32" fill="url(#fieldFill)" stroke="#0c0a09" stroke-width="1.6"/>

    <g stroke="#0c0a09" stroke-width="1.45" fill="none" stroke-linecap="round">
      <path d="M252 282v-17h24"/>
      <path d="M468 282v-17h-24"/>
      <path d="M252 450v17h24"/>
      <path d="M468 450v17h-24"/>
    </g>

    <g fill="#fffefa" stroke="#d8d4cd" stroke-width="1">
      <rect x="252" y="300" width="92" height="38" rx="11"/>
      <rect x="376" y="300" width="92" height="38" rx="11"/>
    </g>

    <g font-family="Inter, Arial, sans-serif" font-size="11.2" font-weight="650" fill="#0c0a09">
      <text x="298" y="324" text-anchor="middle">ingredients</text>
      <text x="422" y="324" text-anchor="middle">skin fit</text>
    </g>

    <rect x="250" y="356" width="220" height="54" rx="27" fill="url(#inkBand)"/>
    <g fill="#fffefa" font-family="Inter, Arial, sans-serif" text-anchor="middle">
      <text x="360" y="379" font-size="11.5" font-weight="750" letter-spacing="3.4">EVIDENCE</text>
      <text x="360" y="397" font-size="11.5" font-weight="650" opacity=".76">checked before skin</text>
    </g>

    <!-- lower verdict row with centered checkmark -->
    <g fill="none" stroke="#0c0a09" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="309" cy="440" r="16"/>
      <path d="M301 440l6 6 11-13"/>
      <path d="M346 432h58M346 448h42"/>
    </g>
  </g>

  <g filter="url(#smallShadow)">
    <rect x="44" y="314" width="144" height="76" rx="14" fill="#fffefd" stroke="#0c0a09" stroke-width="1.15"/>
    <rect x="532" y="314" width="144" height="76" rx="14" fill="#fffefd" stroke="#0c0a09" stroke-width="1.15"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" fill="#0c0a09">
    <text x="86" y="344" font-size="12.5" font-weight="700">label</text>
    <text x="86" y="365" font-size="11.5" fill="#746f67">claims + formula</text>

    <text x="574" y="344" font-size="12.5" font-weight="700">history</text>
    <text x="574" y="365" font-size="11.5" fill="#746f67">tolerance + routine</text>
  </g>

  <g fill="none" stroke="#0c0a09" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
    <rect x="62" y="337" width="18" height="23" rx="3"/>
    <path d="M67 344h8M67 352h9"/>
    <path d="M550 344c6-13 19-13 25 0s19 13 25 0"/>
  </g>

  <g stroke="#0c0a09" stroke-width="1.05" fill="none" opacity=".32" stroke-linecap="round">
    <path d="M188 352h28"/>
    <path d="M504 352h28"/>
    <path d="M360 492v46"/>
  </g>

  <g filter="url(#smallShadow)">
    <rect x="248" y="538" width="224" height="76" rx="14" fill="#fffefd" stroke="#0c0a09" stroke-width="1.15"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" fill="#0c0a09">
    <text x="296" y="572" font-size="12.5" font-weight="700">guided before shelf</text>
    <text x="296" y="594" font-size="11.5" fill="#746f67">checked before you add it</text>
  </g>

  <g fill="none" stroke="#0c0a09" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
    <path d="M271 573h10l7 10 10-23 9 13h22"/>
  </g>

  <g stroke="#0c0a09" stroke-width="1.25" fill="none" stroke-linecap="round" opacity=".88">
    <path d="M256 654h208"/>
    <path d="M304 636h112"/>
  </g>
</svg>
